<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium CGPA Calculator</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-color: #00f2fe;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            color: var(--text-color);
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .course-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 40px;
            gap: 15px;
            margin-bottom: 15px;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 10px;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        option { background: #302b63; }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-add {
            background: rgba(0, 242, 254, 0.2);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            width: 100%;
            margin-bottom: 20px;
        }

        .btn-add:hover {
            background: var(--accent-color);
            color: #000;
        }

        .btn-calc {
            background: linear-gradient(to right, #00f2fe, #4facfe);
            color: white;
            width: 100%;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }

        .btn-calc:hover {
            transform: scale(1.02);
        }

        .remove-btn {
            color: #ff4b2b;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        #result-container {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            display: none;
        }

        .cgpa-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CGPA Calculator</h1>
    
    <div id="course-list">
        <div class="course-row">
            <input type="text" placeholder="Course Name" class="course-name">
            <input type="number" placeholder="Credits" class="credits" min="1">
            <select class="grade">
                <option value="4.0">A</option>
                <option value="3.5">B+</option>
                <option value="3.0">B</option>
                <option value="2.5">C+</option>
                <option value="2.0">C</option>
                <option value="0.0">F</option>
            </select>
            <span></span> </div>
    </div>

    <button class="btn btn-add" onclick="addCourse()">+ Add Course</button>
    <button class="btn btn-calc" onclick="calculateCGPA()">Calculate CGPA</button>

    <div id="result-container">
        <p>Your Calculated CGPA is:</p>
        <div class="cgpa-value" id="cgpa-display">0.00</div>
    </div>
</div>

<script>
    function addCourse() {
        const div = document.createElement('div');
        div.className = 'course-row';
        div.innerHTML = `
            <input type="text" placeholder="Course Name" class="course-name">
            <input type="number" placeholder="Credits" class="credits" min="1">
            <select class="grade">
                <option value="4.0">A</option>
                <option value="3.5">B+</option>
                <option value="3.0">B</option>
                <option value="2.5">C+</option>
                <option value="2.0">C</option>
                <option value="0.0">F</option>
            </select>
            <button class="remove-btn" onclick="this.parentElement.remove()">×</button>
        `;
        document.getElementById('course-list').appendChild(div);
    }

    function calculateCGPA() {
        const credits = document.querySelectorAll('.credits');
        const grades = document.querySelectorAll('.grade');
        
        let totalPoints = 0;
        let totalCredits = 0;

        for (let i = 0; i < credits.length; i++) {
            const creditValue = parseFloat(credits[i].value);
            const gradeValue = parseFloat(grades[i].value);

            if (!isNaN(creditValue)) {
                totalPoints += (creditValue * gradeValue);
                totalCredits += creditValue;
            }
        }

        const cgpa = totalCredits > 0 ? (totalPoints / totalCredits).toFixed(2) : "0.00";
        
        const resultContainer = document.getElementById('result-container');
        const cgpaDisplay = document.getElementById('cgpa-display');
        
        resultContainer.style.display = 'block';
        cgpaDisplay.innerText = cgpa;
    }
</script>

</body>
</html>
